name: Build Debian Package

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'  # 每天UTC时间20:00运行 (对应北京时间次日凌晨4:00)

jobs:
  build-debian-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone smartdns repository
        run: |
          git clone https://github.com/pymumu/smartdns.git

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config musl-tools
          sudo wget -c https://musl.cc/x86_64-linux-musl-cross.tgz -O /tmp/x86_64-linux-musl-cross.tgz
          sudo tar zxvf /tmp/x86_64-linux-musl-cross.tgz -C /opt
          sudo wget -c https://github.com/openssl/openssl/releases/download/openssl-3.0.15/openssl-3.0.15.tar.gz -O /tmp/openssl.tar.gz
          sudo mkdir /tmp/openssl
          sudo tar zxvf /tmp/openssl.tar.gz -C /tmp/openssl --strip-components=1
          sudo cd /tmp/openssl
          sudo export PATH=/opt/x86_64-linux-musl-cross/bin:$PATH
          sudo CC=x86_64-linux-musl-gcc ./Configure linux-x86_64 no-shared \
               --prefix=/opt/x86_64-linux-musl-cross/x86_64-linux-musl \
               --openssldir=/opt/x86_64-linux-musl-cross/x86_64-linux-musl \
               --libdir=lib
          sudo make -j$(nproc)
          sudo make install_sw

      - name: Build SmartDNS Debian package
        run: |
          cd smartdns
          chmod +x package/build-pkg.sh
          export PATH=/opt/x86_64-linux-musl-cross/bin:$PATH
          ./package/build-pkg.sh --platform debian --arch amd64 --with-ui --static

      - name: Push to main branch
        run: |
          # 配置git用户
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 切换到main分支
          git checkout main
          
          # 拉取远程最新更改
          git pull origin main --rebase || echo "Pull failed, continuing with local changes"
          
          # 第一步：先删除main分支上原来的deb包
          git rm --ignore-unmatch *.deb 2>/dev/null || true
          
          # 第二步：仅上传新编译生成的deb包
          cd smartdns
          DEB_FILE=$(find . -name "*.deb" | head -n 1)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" ..
            cd ..
            git add *.deb
          else
            echo "No deb package found to upload!"
            exit 1
          fi
          
          # 检查是否有更改需要提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update SmartDNS Debian package $(date '+%Y-%m-%d %H:%M:%S')"
            # 推送到main分支
            git push origin main
          fi

      - name: Clean up
        run: |
          rm -rf smartdns
